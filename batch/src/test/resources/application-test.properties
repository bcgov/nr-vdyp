# Use in-memory H2 for tests and auto-create Spring Batch schema
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=REGULAR;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tell Spring Batch to initialize schema for tests
spring.batch.jdbc.initialize-schema=always

# Ensure DB initialization runs for test lifecycle
spring.sql.init.mode=always
# Test logging overrides for batch module
logging.level.ca.bc.gov.nrs.vdyp.batch=DEBUG
logging.level.ca.bc.gov.nrs.vdyp.ecore=DEBUG
logging.level.ca.bc.gov.nrs.vdyp.forward=DEBUG
logging.level.ca.bc.gov.nrs.vdyp.fip=DEBUG
logging.level.ca.bc.gov.nrs.vdyp.ecore.projection=DEBUG
# Keep Spring and root at INFO to avoid noise
logging.level.org.springframework=INFO
logging.level.root=INFO
