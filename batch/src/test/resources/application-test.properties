# Use in-memory H2 for tests and auto-create Spring Batch schema
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=REGULAR;LOCK_TIMEOUT=10000
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Tell Spring Batch to initialize schema for tests
spring.batch.jdbc.initialize-schema=always

# Ensure DB initialization runs for test lifecycle
spring.sql.init.mode=always
