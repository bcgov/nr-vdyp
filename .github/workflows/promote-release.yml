name: Promote Tagged Images and Deploy
run-name: Promote ${{ inputs.source_tag }} as ${{ inputs.release_tag }} to ${{ inputs.target_environment }}

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: Existing container tag to promote
        required: true
        type: string
      release_tag:
        description: Release tag to apply to the existing images
        required: true
        type: string
      target_environment:
        description: Target environment to deploy to
        required: true
        default: test
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: read
  packages: write

concurrency:
  group: promote-${{ inputs.target_environment }}
  cancel-in-progress: false

jobs:
  tag-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component-name: [
          frontend, backend, batch
        ]
    steps:
      - uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN}}

      - name: Tag relevant images
        run: |
          docker pull ghcr.io/${{ github.repository }}/${{ matrix.component-name }}:${{ inputs.source_tag }}
          docker tag ghcr.io/${{ github.repository }}/${{ matrix.component-name }}:${{ inputs.source_tag }} ghcr.io/${{ github.repository }}/${{ matrix.component-name }}:${{ inputs.release_tag }}
          docker push ghcr.io/${{ github.repository }}/${{ matrix.component-name }}:${{ inputs.release_tag }}

  # include additional steps for DLV, PRD
  # rename to deploy-wftst, rename environment to tst
  deploy:
    needs: tag-builds
    uses: ./.github/workflows/openshift-target-environment.yml
    secrets: inherit
    with:
      target_environment: ${{ inputs.target_environment }}
      tag: ${{ inputs.release_tag }}
