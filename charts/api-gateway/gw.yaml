_format_version: "3.0"
services:
- host: vdyp-ui-#{TARGET_ENV}#.c50504-#{TARGET_ENV}#.svc
  name: vdyp-ui-#{TARGET_ENV}#
  path: /
  plugins:
    - name: key-auth
      tags: [ "ns.#{GATEWAY_ID}#" ]
      protocols: [http, https]
      config:
        key_names: ["X-API-KEY"]
        run_on_preflight: true
        hide_credentials: true
        key_in_body: false
    - name: kong-upstream-jwt
      tags: [ "ns.#{GATEWAY_ID}#" ]
      config:
        header: GW-JWT
        include_credential_type: false
  port: 80
  protocol: http
  routes:
  - hosts:
    - vdyp#{ENV_URL_COMPONENT}#.api.gov.bc.ca
    methods:
    - GET
    name: vdyp-ui-#{TARGET_ENV}#_~_get
    paths:
    - /api/v8
    plugins: []
    regex_priority: 200
    strip_path: false
    tags:
    - "ns.#{GATEWAY_ID}#"
  - hosts:
    - vdyp#{ENV_URL_COMPONENT}#.api.gov.bc.ca
    methods:
    - GET
    name: vdyp-ui-#{TARGET_ENV}#_hcsv_get
    paths:
    - /api/v8/projection/hcsv
    plugins: []
    regex_priority: 200
    strip_path: false
    tags:
    - "ns.#{GATEWAY_ID}#"
  - hosts:
    - vdyp#{ENV_URL_COMPONENT}#.api.gov.bc.ca
    methods:
    - GET
    name: vdyp-ui-#{TARGET_ENV}#_me_get
    paths:
    - /api/v8/projection/me
    plugins: []
    regex_priority: 200
    strip_path: false
    tags:
    - "ns.#{GATEWAY_ID}#"
  tags:
  - "ns.#{GATEWAY_ID}#"
upstreams: []
