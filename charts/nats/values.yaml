image:
  repository: docker.io/library/nats
  tag: 2.14.0-alpine
  pullPolicy: IfNotPresent

auth:
  enabled: true
  username: vdyp
  password: ""
  existingSecret: ""
  usernameKey: username
  passwordKey: password

natsBox:
  image:
    repository: docker.io/natsio/nats-box
    tag: latest
    pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  clientPort: 4222
  monitorPort: 8222

networkPolicy:
  enabled: true

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  storageClassName: netapp-file-standard
  size: 1Gi

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

jetstreamJob:
  backoffLimit: 6
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 128Mi

jetstream:
  stream:
    name: VDYP_BATCH_REQUESTS
    config:
      name: VDYP_BATCH_REQUESTS
      subjects:
        - vdyp.batch.request.standard
      retention: workqueue
      storage: file
      discard: old
      max_consumers: -1
      max_msgs: -1
      max_msgs_per_subject: -1
      max_bytes: -1
      max_age: 604800000000000
      max_msg_size: -1
      num_replicas: 1
      duplicate_window: 120000000000
      metadata: {}
  consumer:
    stream: VDYP_BATCH_REQUESTS
    name: VDYP_BATCH_WORKER
    config:
      durable_name: VDYP_BATCH_WORKER
      name: VDYP_BATCH_WORKER
      filter_subject: vdyp.batch.request.standard
      ack_policy: explicit
      deliver_policy: all
      replay_policy: instant
      max_ack_pending: 1
      ack_wait: 30000000000
      metadata: {}
      max_deliver: -1
      max_waiting: 512
