apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats.fullname" . }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: client
      port: {{ .Values.service.clientPort }}
      targetPort: client
      protocol: TCP
    - name: monitoring
      port: {{ .Values.service.monitorPort }}
      targetPort: monitoring
      protocol: TCP
  selector:
    {{- include "nats.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nats.fullname" . }}-headless
  labels:
    {{- include "nats.labels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: client
      port: {{ .Values.service.clientPort }}
      targetPort: client
      protocol: TCP
  selector:
    {{- include "nats.selectorLabels" . | nindent 4 }}
