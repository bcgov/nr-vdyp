apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "nats.fullname" . }}
  labels:
    {{- include "nats.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "nats.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "nats.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nats.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nats
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "-js"
            - "-sd"
            - "/data/jetstream"
            - "-m"
            - "{{ .Values.service.monitorPort }}"
            {{- if .Values.auth.enabled }}
            - "--user"
            - "$(NATS_USERNAME)"
            - "--pass"
            - "$(NATS_PASSWORD)"
            {{- end }}
          {{- if .Values.auth.enabled }}
          env:
            - name: NATS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "nats.authSecretName" . }}
                  key: {{ .Values.auth.usernameKey }}
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nats.authSecretName" . }}
                  key: {{ .Values.auth.passwordKey }}
          {{- end }}
          ports:
            - name: client
              containerPort: {{ .Values.service.clientPort }}
              protocol: TCP
            - name: monitoring
              containerPort: {{ .Values.service.monitorPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: monitoring
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /healthz
              port: monitoring
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if not .Values.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "nats.labels" . | nindent 10 }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        {{- if .Values.persistence.storageClassName }}
        storageClassName: {{ .Values.persistence.storageClassName | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
  {{- end }}
